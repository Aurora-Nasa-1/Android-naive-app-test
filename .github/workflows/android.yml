name: Build NCM Player

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_rust:
    name: Build Rust Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: command -v cargo-ndk >/dev/null 2>&1 || cargo install cargo-ndk

      - name: Build Rust Binaries
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a

          # Support 16KB page size for Android 15+ (AOSP 16kb page size support)
          # Ref: https://developer.android.com/guide/practices/page-alignment
          export RUSTFLAGS="-Clink-arg=-Wl,-z,max-page-size=16384"

          # Build only for arm64-v8a (aarch64-linux-android)
          # Build JNI library
          cargo ndk -t arm64-v8a --platform 24 build --release --features jni
          cp target/aarch64-linux-android/release/libncm_api.so android/app/src/main/jniLibs/arm64-v8a/libncm_api.so

      - name: Upload Rust Binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/jniLibs/

  build_android:
    name: Build Android App
    needs: build_rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Download Rust Binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/jniLibs/

      - name: Build with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --parallel --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ncm-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
