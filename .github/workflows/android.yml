name: Build NCM Player

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_rust:
    name: Build Rust Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: command -v cargo-ndk >/dev/null 2>&1 || cargo install cargo-ndk

      - name: Build Rust binaries
        run: |
          mkdir -p android/app/src/main/assets/bin

          # Build only for arm64-v8a (aarch64-linux-android)
          cargo ndk -t arm64-v8a --platform 24 build --release --features server --bin ncm-server
          cp target/aarch64-linux-android/release/ncm-server android/app/src/main/assets/bin/ncm-server-aarch64

      - name: Upload Rust Binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/assets/bin/

  build_android:
    name: Build Android App
    needs: build_rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Download Rust Binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/assets/bin/

      - name: Build with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --parallel --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ncm-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
