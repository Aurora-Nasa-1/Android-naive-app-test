name: Build NCM Player

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_rust:
    name: Build Rust Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust binaries
        run: |
          mkdir -p android/app/src/main/assets/bin

          # We need NDK for cargo-ndk. It's usually pre-installed on GitHub Runners.
          # If not, we might need to install it via setup-android or manual download.
          # Default ANDROID_NDK_HOME is often set on ubuntu-latest.

          cargo ndk -t arm64-v8a --platform 24 build --release --features server --bin ncm-server
          cp target/aarch64-linux-android/release/ncm-server android/app/src/main/assets/bin/ncm-server-aarch64

          cargo ndk -t armeabi-v7a --platform 24 build --release --features server --bin ncm-server
          cp target/armv7-linux-androideabi/release/ncm-server android/app/src/main/assets/bin/ncm-server-armv7

          cargo ndk -t x86_64 --platform 24 build --release --features server --bin ncm-server
          cp target/x86_64-linux-android/release/ncm-server android/app/src/main/assets/bin/ncm-server-x86_64

          cargo ndk -t x86 --platform 24 build --release --features server --bin ncm-server
          cp target/i686-linux-android/release/ncm-server android/app/src/main/assets/bin/ncm-server-i686

      - name: Upload Rust Binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/assets/bin/

  build_android:
    name: Build Android App
    needs: build_rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Rust Binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: android/app/src/main/assets/bin/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew || echo "gradlew not found"

      - name: Build with Gradle
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ncm-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
